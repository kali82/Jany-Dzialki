services:
  - type: web
    name: jany-dzialki
    runtime: node
    region: frankfurt
    # Direct Gmail SMTP requires a paid Render web service because free web
    # services block outbound SMTP ports 25, 465, and 587.
    plan: starter
    buildCommand: corepack enable && corepack prepare pnpm@11.0.9 --activate && pnpm install --frozen-lockfile --ignore-scripts && pnpm run render:build
    startCommand: pnpm start
    healthCheckPath: /api/healthz
    envVars:
      - key: NODE_VERSION
        value: 24.16.0
      - key: BASE_PATH
        value: /
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: 465
      - key: SMTP_SECURE
        value: true
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: CONTACT_TO
        sync: false
      - key: CONTACT_FROM
        sync: false
