services:
  - type: web
    name: jany-dzialki
    runtime: node
    region: frankfurt
    # Contact emails are sent through Brevo's HTTPS API, so this can run on
    # Render Free without outbound SMTP ports.
    plan: free
    buildCommand: corepack enable && corepack prepare pnpm@11.0.9 --activate && pnpm install --frozen-lockfile --ignore-scripts && pnpm run render:build
    startCommand: pnpm start
    healthCheckPath: /api/healthz
    envVars:
      - key: NODE_VERSION
        value: 24.16.0
      - key: BASE_PATH
        value: /
      - key: BREVO_API_KEY
        sync: false
      - key: CONTACT_TO
        sync: false
      - key: CONTACT_FROM
        sync: false
